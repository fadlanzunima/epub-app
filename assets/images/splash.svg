<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1242 2436">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C5F8D"/>
      <stop offset="100%" style="stop-color:#4A90D9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1242" height="2436" fill="url(#bgGradient)"/>

  <!-- Center content group -->
  <g transform="translate(621, 1100)">
    <!-- Book icon -->
    <g transform="translate(-120, -160)">
      <!-- Book shape -->
      <rect x="0" y="0" width="240" height="320" rx="12" fill="#FFFFFF"/>

      <!-- Book spine -->
      <rect x="0" y="0" width="20" height="320" fill="#E8E8E8"/>

      <!-- Pages -->
      <rect x="20" y="10" width="210" height="300" fill="#F8F8F8"/>

      <!-- Text lines -->
      <rect x="45" y="50" width="160" height="12" rx="3" fill="#DDDDDD"/>
      <rect x="45" y="80" width="140" height="12" rx="3" fill="#DDDDDD"/>
      <rect x="45" y="110" width="170" height="12" rx="3" fill="#DDDDDD"/>
      <rect x="45" y="140" width="130" height="12" rx="3" fill="#DDDDDD"/>
      <rect x="45" y="170" width="150" height="12" rx="3" fill="#DDDDDD"/>
      <rect x="45" y="200" width="120" height="12" rx="3" fill="#DDDDDD"/>
      <rect x="45" y="230" width="160" height="12" rx="3" fill="#DDDDDD"/>
      <rect x="45" y="260" width="100" height="12" rx="3" fill="#DDDDDD"/>

      <!-- Bookmark -->
      <path d="M200 0 L200 100 L220 85 L240 100 L240 0 Z" fill="#E74C3C"/>
    </g>

    <!-- App name -->
    <text y="220" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#FFFFFF" text-anchor="middle">E-Reader</text>

    <!-- Tagline -->
    <text y="290" font-family="Arial, sans-serif" font-size="36" fill="#E0E0E0" text-anchor="middle">Your Digital Library</text>
  </g>

  <!-- Decorative circles -->
  <circle cx="200" cy="400" r="80" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="1050" cy="600" r="120" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="150" cy="1800" r="100" fill="#FFFFFF" opacity="0.06"/>
  <circle cx="1100" cy="2000" r="60" fill="#FFFFFF" opacity="0.1"/>
</svg>